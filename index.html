<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DrinkIt</title>
<link rel="icon" href="assets/favicon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="login" class="page card">
<img src="assets/logo.png" class="logo">
<h1>DrinkIt</h1>
<input id="email" placeholder="Email">
<button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">
<header class="card">
<img src="assets/logo.png" class="logo">
<h1>DrinkIt</h1>
<p>Hydrate • Health • Happiness</p>
</header>

<div class="card water">
<h1 id="percent">0%</h1>
<p id="ml">0 / 2000 ML</p>
</div>

<button onclick="addWater(250)">250 ML</button>
<button onclick="addWater(500)">500 ML</button>
<button onclick="addWater(1000)">1 L</button>

<div class="card">
<h2>Profile</h2>
<input id="name" placeholder="Name" onchange="saveProfile()">
<select id="gender" onchange="saveProfile()">
<option>Male</option><option>Female</option><option>Other</option>
</select>
<input type="file">
</div>

<div class="card">
<h2>About Creator</h2>
<h3>Bhairu Sharma</h3>
<p>Innovator & Developer</p>
</div>

<div class="card">
<h2>Health Information</h2>
<p>Hydration tips, dehydration signs and wellness guidance.</p>
</div>

<button onclick="enableNotification()">Enable Notification</button>
</div>

<script src="js/app.js"></script>
</body>
</html>
